[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--cov=workflow --cov-report=term-missing --cov-report=xml"

[tool.coverage.run]
source = ["workflow"]
branch = true

[tool.coverage.report]
fail_under = 90
show_missing = true
omit = ["workflow/modular/*", "workflow/query_cbioportal.py"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
